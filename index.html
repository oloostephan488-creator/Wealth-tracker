<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthTrack | Live Portfolio</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #121212;
            --accent: #00d1ff;
            --success: #00ff88;
            --danger: #ff4444;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 100px; /* Space for the form at the bottom */
        }

        /* HEADER */
        .header { margin: 20px 0; }
        .header p { color: var(--text-dim); margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .total-value { font-size: 2.5rem; font-weight: 800; color: var(--text-main); margin-top: 5px; }

        /* SEARCH BAR */
        .search-box {
            width: 100%;
            padding: 15px;
            background: #161616;
            border: 1px solid #222;
            border-radius: 12px;
            color: white;
            margin-bottom: 20px;
            outline: none;
        }

        /* ASSET CARDS */
        .asset-card {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            border-radius: 18px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .asset-name { font-weight: 700; font-size: 1rem; margin: 0; }
        .asset-holdings { color: var(--text-dim); font-size: 0.8rem; margin: 0; }
        .price-info { text-align: right; }
        .price-val { font-weight: 700; margin: 0; }
        .change-pct { font-size: 0.75rem; font-weight: 600; }

        /* ADD ASSET FORM (Fixed at bottom) */
        .add-form {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #161616;
            padding: 15px 20px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        .add-form input {
            flex: 1;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .add-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <p>Total Balance (USD)</p>
        <div class="total-value" id="grand-total">$0.00</div>
        <div id="status" style="font-size: 0.7rem; color: var(--text-dim); margin-top: 5px;">Connecting to live markets...</div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="Search your assets...">

    <div id="portfolio-list">
        </div>

    <div class="add-form">
        <input type="text" id="coinId" placeholder="Coin ID (e.g. bitcoin)">
        <input type="number" id="coinAmount" placeholder="Amount">
        <button class="add-btn" onclick="addAsset()">Add</button>
    </div>

    <script>
        // Initial Wallet Data
        let myWallet = [
            { id: "bitcoin", amount: 0.02 },
            { id: "ethereum", amount: 0.5 },
            { id: "solana", amount: 15 }
        ];

        // 1. THE FETCH FUNCTION (Gets data from internet)
        async function updatePortfolio() {
            try {
                const ids = myWallet.map(c => c.id).join(',');
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
                const prices = await response.json();
                
                renderUI(prices);
                document.getElementById('status').innerText = "Last Updated: " + new Date().toLocaleTimeString();
            } catch (err) {
                document.getElementById('status').innerText = "Update Failed. Check Data Connection.";
            }
        }

        // 2. THE UI FUNCTION (Draws everything)
        function renderUI(priceData, filter = "") {
            const list = document.getElementById('portfolio-list');
            list.innerHTML = "";
            let totalVal = 0;

            const filtered = myWallet.filter(c => c.id.includes(filter.toLowerCase()));

            filtered.forEach(coin => {
                const price = priceData[coin.id]?.usd || 0;
                const change = priceData[coin.id]?.usd_24h_change || 0;
                const value = coin.amount * price;
                totalVal += value;

                list.innerHTML += `
                    <div class="asset-card">
                        <div>
                            <p class="asset-name">${coin.id.toUpperCase()}</p>
                            <p class="asset-holdings">${coin.amount} Units</p>
                        </div>
                        <div class="price-info">
                            <p class="price-val">$${value.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                            <span class="change-pct" style="color: ${change >= 0 ? 'var(--success)' : 'var(--danger)'}">
                                ${change.toFixed(2)}%
                            </span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('grand-total').innerText = `$${totalVal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        // 3. THE ADD FUNCTION
        function addAsset() {
            const id = document.getElementById('coinId').value.toLowerCase().trim();
            const amount = parseFloat(document.getElementById('coinAmount').value);

            if (id && amount) {
                myWallet.push({ id: id, amount: amount });
                updatePortfolio(); // Refresh
                document.getElementById('coinId').value = "";
                document.getElementById('coinAmount').value = "";
            }
        }

        // 4. SEARCH LISTENER
        document.getElementById('searchInput').addEventListener('input', (e) => {
            // Re-render based on existing data when searching
            updatePortfolio(); 
        });

        // Start the app
        updatePortfolio();
        setInterval(updatePortfolio, 60000); // Auto-refresh every minute
    </script>
</body>
</html>
